# This file is centrally managed; local edits may be lost.

name: Notify Home Assistant add-on repository
description: Notify the central Home Assistant add-on repository about a published version

# Contract:
# - Presence at .github/actions/notify_hass_addons/action.yml opts the repository in.
# - CI invokes this only after its GitHub Release and Docker publication succeed.
# - CI_RELEASE_TAG is an exact stable numeric version such as 0.5.4.
# - Only the invoking notification job receives the dispatch token.

runs:
  using: composite
  steps:
    - name: Dispatch add-on release
      shell: bash
      env:
        DISPATCH_TOKEN: ${{ env.HASS_ADDONS_REPOSITORY_DISPATCH_TOKEN }}
        DISPATCH_RELEASE_TAG: ${{ env.CI_RELEASE_TAG }}
        DISPATCH_SOURCE_REPOSITORY: ${{ github.repository }}
        DISPATCH_TARGET_REPOSITORY: LordMike/hass-addons
        DISPATCH_EVENT_TYPE: addon-release
      run: |
        set -euo pipefail

        if [ -z "$DISPATCH_TOKEN" ]; then
          echo '::error::HASS_ADDONS_REPOSITORY_DISPATCH_TOKEN is required for add-on notification.'
          exit 1
        fi

        curl -fsSL -X POST \
          -H "Authorization: Bearer $DISPATCH_TOKEN" \
          -H 'Accept: application/vnd.github+json' \
          -H 'X-GitHub-Api-Version: 2026-03-10' \
          "https://api.github.com/repos/${DISPATCH_TARGET_REPOSITORY}/dispatches" \
          -d "$(jq -nc \
            --arg event_type "$DISPATCH_EVENT_TYPE" \
            --arg source_repo "$DISPATCH_SOURCE_REPOSITORY" \
            --arg tag "$DISPATCH_RELEASE_TAG" \
            '{event_type:$event_type,client_payload:{source_repo:$source_repo,tag:$tag}}')"
